name: Build Technologies Soft Pro - Windows EXE

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    name: بناء تطبيق ويندوز
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ⚙️ تثبيت Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🔧 تثبيت بناء Python (لـ better-sqlite3)
        run: |
          python -m pip install --upgrade pip setuptools

      - name: 📦 تثبيت اعتماديات المشروع
        run: |
          npm install --no-audit --no-fund --loglevel=error
        env:
          npm_config_build_from_source: false
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.electron-builder-cache

      - name: 🔨 إعادة بناء الموديولات الأصلية لـ Electron
        run: |
          npx electron-builder install-app-deps

      - name: 🏗️ بناء ملف التثبيت EXE (x64 + ia32)
        run: |
          npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.electron-builder-cache

      - name: 📋 عرض الملفات المُولّدة
        if: always()
        run: |
          dir dist
        shell: cmd

      - name: ⬆️ رفع ملف التثبيت كـ Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Technologies-Soft-Pro-Windows-Installer
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          retention-days: 30
          if-no-files-found: error

      - name: 📦 رفع كنسخة كاملة (للتشخيص)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Technologies-Soft-Pro-Debug
          path: |
            dist/
            !dist/win-unpacked/
          retention-days: 7

      - name: 🚀 إنشاء Release عند Tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/latest.yml
          name: تقنيات سوفت Pro ${{ github.ref_name }}
          body: |
            ## إصدار جديد من تقنيات سوفت Pro
            
            ### التحميل:
            - **Windows 64-bit**: حمّل ملف `Setup-x64.exe`
            - **Windows 32-bit**: حمّل ملف `Setup-ia32.exe`
            
            ### التثبيت:
            1. حمّل ملف التثبيت المناسب لنظامك
            2. شغّل الملف وانقر "موافق" على تحذير ويندوز (التطبيق آمن)
            3. اتبع خطوات التثبيت
            
            تصميم م/ عبدالرحمن الاكوع - 773579486 967+
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
