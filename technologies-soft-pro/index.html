<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقنيات سوفت - نظام المطعم الاحترافي</title>
    <link rel="icon" type="image/png" href="assets/logo-sm.png">
    <!-- FontAwesome - محلي للعمل بدون انترنت -->
    <link rel="stylesheet" href="vendor/css/fontawesome.min.css">
    <!-- خط Tajawal العربي - محلي -->
    <link rel="stylesheet" href="vendor/css/tajawal.css">
    <!-- Chart.js للرسوم البيانية - محلي -->
    <script src="vendor/js/chart.min.js"></script>
    <!-- SheetJS لتصدير Excel - محلي -->
    <script src="vendor/js/xlsx.min.js"></script>

    <style>
        :root {
            --primary: #1e88e5;
            --primary-dark: #1565c0;
            --primary-light: #42a5f5;
            --accent: #00bcd4;
            --accent-glow: #4dd0e1;
            --secondary: #0d47a1;
            --bg-dark: #0a1929;
            --bg-darker: #050e1a;
            --sidebar-bg: #0f1e35;
            --sidebar-hover: #1a2c4a;
            --text-light: #e3f2fd;
            --text-muted: #90a4ae;
            --success: #4caf50;
            --danger: #f44336;
            --warning: #ff9800;
            --info: #2196f3;
            --card-bg: #ffffff;
            --bg-main: #f0f4f8;
            --border: #cfd8dc;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.06);
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 16px;
            --transition: all 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Segoe UI', Tahoma, sans-serif;
        }

        html, body { height: 100%; }

        body {
            display: flex;
            min-height: 100vh;
            overflow: hidden;
            background: var(--bg-main);
            color: #263238;
            font-size: 14px;
            line-height: 1.5;
        }

        /* ==================== شاشة تسجيل الدخول ==================== */
        #login-screen {
            display: flex;
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 50%, var(--secondary) 100%);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            overflow: hidden;
        }
        #login-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(0,188,212,0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(30,136,229,0.18) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 60%);
            animation: bgPulse 8s ease-in-out infinite alternate;
        }
        @keyframes bgPulse {
            from { opacity: 0.7; }
            to { opacity: 1; }
        }
        #login-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.5;
        }

        .login-box {
            position: relative;
            background: rgba(255,255,255,0.97);
            padding: 40px 35px 25px;
            border-radius: 20px;
            text-align: center;
            min-width: 380px;
            max-width: 90%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            z-index: 2;
            animation: loginAppear 0.6s ease-out;
        }
        @keyframes loginAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-logo {
            width: 110px;
            height: 110px;
            margin: -90px auto 15px;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0,188,212,0.4), 0 0 0 4px rgba(255,255,255,0.95);
            background: white;
            padding: 4px;
            display: block;
        }
        .login-logo img { width: 100%; height: 100%; border-radius: 18px; }
        .login-box h2 {
            color: var(--secondary);
            font-weight: 900;
            font-size: 22px;
            margin-bottom: 6px;
        }
        .login-box .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 25px;
        }
        .login-field {
            position: relative;
            margin-bottom: 15px;
            text-align: right;
        }
        .login-field i {
            position: absolute;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 16px;
        }
        .login-field input {
            width: 100%;
            padding: 14px 42px 14px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: var(--transition);
            background: #f7fafc;
            font-family: inherit;
        }
        .login-field input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(30,136,229,0.15);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: var(--transition);
            box-shadow: 0 6px 18px rgba(30,136,229,0.35);
            letter-spacing: 0.5px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(30,136,229,0.45);
        }
        .btn-login:active { transform: translateY(0); }
        .login-footer {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid #eef2f7;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .login-footer i { color: var(--primary); margin-left: 4px; }

        /* ==================== التطبيق الرئيسي ==================== */
        #app-main { display: none; width: 100%; }

        /* ==================== الشريط الجانبي ==================== */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, var(--sidebar-bg) 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            padding: 0;
            box-shadow: -4px 0 16px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }
        .sidebar .logo {
            padding: 18px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.15);
        }
        .sidebar .logo img {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,188,212,0.3);
        }
        .sidebar .logo .logo-text h2 {
            font-size: 17px;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(90deg, #fff 0%, var(--accent-glow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar .logo .logo-text span {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .nav-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 12px 8px;
            overflow-y: auto;
        }
        .nav-menu::-webkit-scrollbar { width: 4px; }
        .nav-menu::-webkit-scrollbar-track { background: transparent; }
        .nav-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            text-align: right;
            width: 100%;
            font-family: inherit;
            font-weight: 500;
            position: relative;
        }
        .nav-btn i {
            width: 22px;
            font-size: 16px;
            text-align: center;
            color: var(--accent-glow);
        }
        .nav-btn:hover {
            background: var(--sidebar-hover);
            transform: translateX(-3px);
        }
        .nav-btn.active {
            background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(30,136,229,0.4);
        }
        .nav-btn.active i { color: white; }
        .nav-btn .badge-mini {
            margin-right: auto;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 700;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.2);
        }
        .user-info .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 16px;
        }
        .user-info .info-text { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .user-info .info-text .name {
            font-size: 13px;
            font-weight: 700;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-info .info-text .role-badge {
            font-size: 10px;
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 8px;
            display: inline-block;
            width: fit-content;
            margin-top: 2px;
            font-weight: 700;
        }

        /* ==================== المحتوى الرئيسي ==================== */
        .main-content {
            flex: 1;
            padding: 22px 28px;
            overflow-y: auto;
            background: var(--bg-main);
            background-image:
                radial-gradient(circle at 100% 0%, rgba(30,136,229,0.04) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(0,188,212,0.04) 0%, transparent 50%);
        }
        .main-content::-webkit-scrollbar { width: 8px; }
        .main-content::-webkit-scrollbar-thumb { background: #b0bec5; border-radius: 4px; }
        .main-content::-webkit-scrollbar-thumb:hover { background: #78909c; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 14px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }
        .page-header h1 {
            font-size: 22px;
            color: var(--secondary);
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .page-header h1 i { color: var(--primary); }
        .page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        /* ==================== بطاقات الإحصائيات ==================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 22px;
        }
        .stat-card {
            background: white;
            padding: 18px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.04);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .stat-card.success::before { background: var(--success); }
        .stat-card.danger::before { background: var(--danger); }
        .stat-card.warning::before { background: var(--warning); }
        .stat-card.info::before { background: var(--info); }

        .stat-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            flex-shrink: 0;
        }
        .stat-card.success .stat-icon { background: linear-gradient(135deg, #4caf50 0%, #8bc34a 100%); }
        .stat-card.danger .stat-icon { background: linear-gradient(135deg, #f44336 0%, #e91e63 100%); }
        .stat-card.warning .stat-icon { background: linear-gradient(135deg, #ff9800 0%, #ffc107 100%); }
        .stat-card.info .stat-icon { background: linear-gradient(135deg, #2196f3 0%, #00bcd4 100%); }

        .stat-info h3 {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 600;
        }
        .stat-info p {
            font-size: 22px;
            font-weight: 800;
            color: var(--secondary);
        }
        .stat-info .stat-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ==================== الجداول ==================== */
        .table-wrap {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #eceff1;
            font-size: 13.5px;
        }
        th {
            background: linear-gradient(180deg, #f5f7fa 0%, #eceff1 100%);
            font-weight: 800;
            color: var(--secondary);
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        tbody tr { transition: var(--transition); }
        tbody tr:hover { background: #f5f7fa; }
        tbody tr:last-child td { border-bottom: none; }

        /* ==================== الأزرار ==================== */
        .btn {
            padding: 9px 16px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 700;
            font-size: 13.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            font-family: inherit;
            white-space: nowrap;
            box-shadow: var(--shadow-sm);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); color: white; }
        .btn-danger { background: linear-gradient(135deg, #f44336 0%, #e91e63 100%); color: white; }
        .btn-success { background: linear-gradient(135deg, #4caf50 0%, #66bb6a 100%); color: white; }
        .btn-secondary { background: #607d8b; color: white; }
        .btn-warning { background: linear-gradient(135deg, #ff9800 0%, #ffc107 100%); color: white; }
        .btn-info { background: linear-gradient(135deg, #2196f3 0%, #00bcd4 100%); color: white; }
        .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn-lg { padding: 12px 22px; font-size: 15px; }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; }

        /* ==================== المودال ==================== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 25, 41, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal.active { display: flex; animation: modalFadeIn 0.25s ease-out; }
        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: white;
            border-radius: var(--radius-lg);
            padding: 26px;
            width: 90%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 70px rgba(0,0,0,0.4);
            animation: modalSlideIn 0.3s ease-out;
        }
        .modal-content.wide { max-width: 900px; }
        .modal-content.xwide { max-width: 1200px; }
        @keyframes modalSlideIn {
            from { transform: translateY(-30px) scale(0.96); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 14px;
            margin-bottom: 18px;
            border-bottom: 2px solid #eceff1;
        }
        .modal-header h3 {
            color: var(--secondary);
            font-weight: 800;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-header h3 i { color: var(--primary); }
        .modal-close {
            background: transparent;
            border: none;
            font-size: 22px;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .modal-close:hover { background: #ffebee; color: var(--danger); }

        /* ==================== النماذج ==================== */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 700;
            color: #455a64;
            font-size: 13px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #cfd8dc;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
            background: #f7fafc;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(30,136,229,0.12);
        }
        .form-group textarea { min-height: 80px; resize: vertical; }

        /* ==================== نقطة البيع ==================== */
        .pos-container {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 18px;
            height: calc(100vh - 130px);
        }
        .menu-section {
            background: white;
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            min-height: 0;
        }
        .menu-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .menu-toolbar input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #cfd8dc;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        .menu-toolbar input:focus { outline: none; border-color: var(--primary); }
        .category-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eceff1;
        }
        .cat-btn {
            padding: 9px 18px;
            border: 2px solid var(--primary);
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-weight: 700;
            color: var(--primary);
            transition: var(--transition);
            font-family: inherit;
            font-size: 13px;
        }
        .cat-btn:hover { background: rgba(30,136,229,0.08); }
        .cat-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(30,136,229,0.3);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            overflow-y: auto;
            flex: 1;
            padding: 4px;
        }
        .item-card {
            background: white;
            border: 2px solid #eceff1;
            border-radius: var(--radius);
            padding: 12px 10px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            user-select: none;
        }
        .item-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .item-card:active { transform: translateY(-1px) scale(0.98); }
        .item-card .item-img {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary);
            margin: 0 auto 8px;
            overflow: hidden;
        }
        .item-card .item-img img { width: 100%; height: 100%; object-fit: cover; }
        .item-card .item-name {
            font-weight: 700;
            color: var(--secondary);
            font-size: 13.5px;
            margin-bottom: 4px;
            min-height: 38px;
        }
        .item-card .item-price {
            color: var(--success);
            font-weight: 800;
            font-size: 15px;
        }
        .item-card.stock-warning::after {
            content: '⚠';
            position: absolute;
            top: 6px;
            left: 6px;
            background: var(--warning);
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .invoice-section {
            background: white;
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            min-height: 0;
        }
        .invoice-section h3 {
            color: var(--secondary);
            font-weight: 800;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eceff1;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            min-height: 100px;
            max-height: 35vh;
        }
        .cart-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            padding: 10px 8px;
            border-bottom: 1px solid #eceff1;
            align-items: center;
        }
        .cart-item:hover { background: #f5f7fa; }
        .cart-item-name {
            font-weight: 700;
            color: var(--secondary);
            font-size: 13.5px;
        }
        .cart-item-meta { font-size: 11px; color: var(--text-muted); }
        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .qty-btn {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-btn.minus { background: var(--danger); }
        .qty-display {
            min-width: 28px;
            text-align: center;
            font-weight: 800;
            color: var(--secondary);
        }
        .cart-item-price {
            font-weight: 800;
            color: var(--success);
            font-size: 14px;
            min-width: 65px;
            text-align: left;
        }
        .remove-btn {
            background: transparent;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
        }

        .invoice-summary {
            border-top: 2px dashed #cfd8dc;
            padding-top: 10px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13.5px;
            color: #455a64;
        }
        .summary-row.total {
            font-size: 19px;
            font-weight: 800;
            color: var(--success);
            padding-top: 8px;
            border-top: 2px solid var(--primary);
            margin-top: 6px;
        }

        .payment-options { display: flex; gap: 8px; margin: 12px 0; }
        .payment-options button {
            flex: 1;
            padding: 10px;
            border: 2px solid #cfd8dc;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 700;
            font-family: inherit;
            font-size: 13px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .payment-options button.active {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(30,136,229,0.1) 0%, rgba(0,188,212,0.08) 100%);
            color: var(--primary);
        }
        .payment-options button i { font-size: 14px; }

        .stock-danger { background-color: #ffebee !important; font-weight: bold; }

        .alert-warning {
            background: linear-gradient(135deg, #fff3cd 0%, #ffe0a3 100%);
            border-right: 4px solid #ff9800;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            color: #856404;
            font-weight: 600;
        }
        .alert-danger {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            border-right: 4px solid var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            color: #c62828;
            font-weight: 600;
        }
        .alert-info {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-right: 4px solid var(--info);
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            color: var(--secondary);
            font-weight: 600;
        }
        .alert-success {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border-right: 4px solid var(--success);
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            color: #2e7d32;
            font-weight: 600;
        }

        .shift-info-box {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-right: 4px solid var(--primary);
            padding: 11px 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--secondary);
        }

        .badge {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11.5px;
            font-weight: 700;
            display: inline-block;
        }
        .badge-success { background: linear-gradient(135deg, #4caf50 0%, #66bb6a 100%); }
        .badge-danger { background: linear-gradient(135deg, #f44336 0%, #e91e63 100%); }
        .badge-warning { background: linear-gradient(135deg, #ff9800 0%, #ffc107 100%); color: #5d4037; }
        .badge-secondary { background: #607d8b; }

        /* ==================== Tabs (التبويبات الفرعية) ==================== */
        .tabs-row {
            display: flex;
            gap: 4px;
            margin-bottom: 18px;
            border-bottom: 2px solid #eceff1;
            padding-bottom: 0;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 14px;
            border-bottom: 3px solid transparent;
            transition: var(--transition);
            margin-bottom: -2px;
        }
        .tab-btn:hover { color: var(--primary); }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* ==================== الرسوم البيانية ==================== */
        .chart-container {
            background: white;
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
        }
        .chart-container h3 {
            color: var(--secondary);
            font-weight: 800;
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-container h3 i { color: var(--primary); }
        .chart-wrap {
            position: relative;
            height: 280px;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 18px;
        }
        @media (max-width: 1100px) {
            .charts-grid { grid-template-columns: 1fr; }
        }

        /* ==================== الطباعة ==================== */
        @media print {
            body * { visibility: hidden; }
            #thermal-receipt, #shift-report-receipt, #thermal-receipt *, #shift-report-receipt * { visibility: visible; }
            #thermal-receipt, #shift-report-receipt {
                position: absolute;
                left: 0;
                top: 0;
                width: 74mm;
                margin: 0;
                padding: 2mm;
                font-size: 12px;
                background: white;
                color: black;
                direction: rtl;
            }
        }

        /* ==================== لوحة المفاتيح اللمسية ==================== */
        .kb-btn {
            padding: 8px 12px;
            font-size: 16px;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            min-width: 38px;
            text-align: center;
            user-select: none;
            font-family: inherit;
            transition: var(--transition);
        }
        .kb-btn:active { background: #cfd8dc; transform: scale(0.95); }

        #touch-keyboard {
            direction: rtl;
            display: none;
            position: fixed;
            bottom: 60px;
            left: 0;
            width: 100%;
            background: #eceff1;
            padding: 12px;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.2);
            z-index: 9998;
            border-top: 2px solid var(--primary);
        }
        #touch-keyboard .kb-btn { direction: ltr; }

        #toggle-keyboard-btn {
            position: fixed;
            bottom: 12px;
            left: 12px;
            z-index: 9999;
        }

        /* ==================== Misc ==================== */
        .text-success { color: var(--success) !important; }
        .text-danger { color: var(--danger) !important; }
        .text-warning { color: var(--warning) !important; }
        .text-info { color: var(--info) !important; }
        .text-muted { color: var(--text-muted) !important; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 48px;
            color: #cfd8dc;
            margin-bottom: 12px;
        }
        .empty-state p { font-size: 15px; }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #cfd8dc;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* الإستجابة للشاشات الصغيرة */
        @media (max-width: 992px) {
            .pos-container { grid-template-columns: 1fr; height: auto; }
            .form-row, .form-row.three { grid-template-columns: 1fr; }
            .sidebar { width: 200px; }
            .main-content { padding: 16px; }
        }

        /* ==================== Toast (إشعارات) ==================== */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            padding: 12px 22px;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastIn 0.3s ease-out;
            min-width: 280px;
            pointer-events: auto;
        }
        .toast.success { background: linear-gradient(135deg, #4caf50, #66bb6a); }
        .toast.danger { background: linear-gradient(135deg, #f44336, #e91e63); }
        .toast.warning { background: linear-gradient(135deg, #ff9800, #ffc107); color: #5d4037; }
        .toast.info { background: linear-gradient(135deg, #2196f3, #00bcd4); }
        @keyframes toastIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- ==================== شاشة تسجيل الدخول ==================== -->
    <div id="login-screen">
        <div class="login-box">
            <div class="login-logo">
                <img src="assets/logo.png" alt="تقنيات سوفت">
            </div>
            <h2>تقنيات سوفت</h2>
            <p class="subtitle">نظام إدارة المطعم الاحترافي</p>

            <form id="login-form" onsubmit="event.preventDefault(); submitLogin();">
                <div class="login-field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="login-username" placeholder="اسم المستخدم" autocomplete="username" required>
                </div>
                <div class="login-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="كلمة المرور" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> دخول إلى النظام
                </button>
            </form>

            <div class="login-footer">
                <i class="fas fa-code"></i>
                تصميم م/ عبدالرحمن الاكوع - 773579486 967+
            </div>
        </div>
    </div>

    <!-- ==================== التطبيق الرئيسي ==================== -->
    <div id="app-main">
        <aside class="sidebar">
            <div class="logo">
                <img src="assets/logo-sm.png" alt="logo">
                <div class="logo-text">
                    <h2>تقنيات سوفت</h2>
                    <span>نظام المطعم v3.0</span>
                </div>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</button>
                <button class="nav-btn" data-tab="pos"><i class="fas fa-cash-register"></i> نقطة البيع</button>
                <button class="nav-btn" data-tab="orders"><i class="fas fa-receipt"></i> الطلبات</button>
                <button class="nav-btn" data-tab="products"><i class="fas fa-boxes"></i> المنتجات</button>
                <button class="nav-btn" data-tab="categories"><i class="fas fa-tags"></i> الأقسام</button>
                <button class="nav-btn" data-tab="materials"><i class="fas fa-cubes"></i> المواد الخام</button>
                <button class="nav-btn" data-tab="inventory"><i class="fas fa-warehouse"></i> جرد المخزون</button>
                <button class="nav-btn" data-tab="customers"><i class="fas fa-users"></i> العملاء</button>
                <button class="nav-btn" data-tab="suppliers"><i class="fas fa-truck"></i> الموردون</button>
                <button class="nav-btn" data-tab="tables"><i class="fas fa-chair"></i> الطاولات</button>
                <button class="nav-btn" data-tab="waiters"><i class="fas fa-user-tie"></i> الكباتن</button>
                <button class="nav-btn" data-tab="reports"><i class="fas fa-chart-line"></i> التقارير</button>
                <button class="nav-btn" data-tab="expenses"><i class="fas fa-money-bill-wave"></i> المصروفات</button>
                <button class="nav-btn" data-tab="audit"><i class="fas fa-history"></i> سجل التدقيق</button>
                <button class="nav-btn" data-tab="users"><i class="fas fa-users-cog"></i> المستخدمين</button>
                <button class="nav-btn" data-tab="settings"><i class="fas fa-cog"></i> الإعدادات</button>
            </nav>
            <div class="user-info">
                <div class="avatar" id="user-avatar">م</div>
                <div class="info-text">
                    <span class="name" id="current-user-display">مدير النظام</span>
                    <span class="role-badge" id="user-role-badge">admin</span>
                </div>
            </div>
        </aside>
        <main class="main-content" id="main-content"></main>
    </div>

    <!-- ==================== مودال عام ==================== -->
    <div id="modal" class="modal"><div class="modal-content" id="modal-content"></div></div>

    <!-- ==================== مودال بيانات المطعم ==================== -->
    <div id="company-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-store"></i> بيانات المطعم والضريبة</h3>
            </div>
            <p style="text-align:center; color:var(--text-muted); margin-bottom:18px; font-size:13px;">تظهر هذه البيانات في الفواتير والتقارير</p>
            <div class="form-row">
                <div class="form-group"><label>اسم المطعم *</label><input type="text" id="company-name" placeholder="اسم المطعم"></div>
                <div class="form-group"><label>رقم الهاتف</label><input type="text" id="company-phone" placeholder="رقم الهاتف"></div>
            </div>
            <div class="form-group"><label>العنوان</label><input type="text" id="company-address" placeholder="العنوان"></div>
            <div class="form-row">
                <div class="form-group"><label>الرقم الضريبي (اختياري)</label><input type="text" id="company-tax" placeholder="الرقم الضريبي"></div>
                <div class="form-group"><label>نسبة الضريبة (%)</label><input type="number" id="company-tax-rate" placeholder="مثال: 15" step="0.01" min="0" value="0"></div>
            </div>
            <button class="btn btn-primary btn-lg" onclick="saveCompanyFromModal()" style="width:100%;"><i class="fas fa-save"></i> حفظ البيانات</button>
        </div>
    </div>

    <!-- ==================== مودال إرجاع الطلب ==================== -->
    <div id="refund-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-undo"></i> إرجاع طلب</h3>
                <button class="modal-close" onclick="document.getElementById('refund-modal').classList.remove('active')">&times;</button>
            </div>
            <div class="form-group"><label>رقم الطلب</label><input type="number" id="refund-order-id" placeholder="أدخل رقم الطلب"></div>
            <div class="form-group"><label>سبب الإرجاع</label><input type="text" id="refund-reason" placeholder="سبب الإرجاع"></div>
            <button class="btn btn-danger btn-lg" onclick="processRefund()" style="width:100%;"><i class="fas fa-check"></i> تأكيد الإرجاع</button>
        </div>
    </div>

    <!-- ==================== مودال تغيير كلمة المرور ==================== -->
    <div id="password-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-key"></i> تغيير كلمة المرور</h3>
                <button class="modal-close" onclick="document.getElementById('password-modal').classList.remove('active')">&times;</button>
            </div>
            <div class="form-group"><label>كلمة المرور الحالية</label><input type="password" id="old-password"></div>
            <div class="form-group"><label>كلمة المرور الجديدة</label><input type="password" id="new-password"></div>
            <div class="form-group"><label>تأكيد كلمة المرور</label><input type="password" id="confirm-password"></div>
            <button class="btn btn-primary btn-lg" onclick="changePassword()" style="width:100%;"><i class="fas fa-save"></i> تغيير كلمة المرور</button>
        </div>
    </div>

    <!-- ==================== مناطق الطباعة (مخفية) ==================== -->
    <div id="thermal-receipt" style="display:none;"></div>
    <div id="shift-report-receipt" style="display:none;"></div>

    <!-- ==================== حاوية إشعارات Toast ==================== -->
    <div id="toast-container"></div>

    <!-- ==================== زر لوحة المفاتيح اللمسية ==================== -->
    <button id="toggle-keyboard-btn" class="btn btn-secondary btn-sm">
        <i class="fas fa-keyboard"></i> لوحة المفاتيح
    </button>

    <!-- ==================== لوحة المفاتيح اللمسية ==================== -->
    <div id="touch-keyboard">
        <div style="display:flex; flex-wrap:wrap; gap:4px; justify-content:center;">
            <button class="kb-btn" data-char="1">1</button>
            <button class="kb-btn" data-char="2">2</button>
            <button class="kb-btn" data-char="3">3</button>
            <button class="kb-btn" data-char="4">4</button>
            <button class="kb-btn" data-char="5">5</button>
            <button class="kb-btn" data-char="6">6</button>
            <button class="kb-btn" data-char="7">7</button>
            <button class="kb-btn" data-char="8">8</button>
            <button class="kb-btn" data-char="9">9</button>
            <button class="kb-btn" data-char="0">0</button>
            <button class="kb-btn" data-char=".">.</button>
            <button class="kb-btn" data-char=",">,</button>
            <button class="kb-btn" data-char="أ">أ</button>
            <button class="kb-btn" data-char="ب">ب</button>
            <button class="kb-btn" data-char="ت">ت</button>
            <button class="kb-btn" data-char="ث">ث</button>
            <button class="kb-btn" data-char="ج">ج</button>
            <button class="kb-btn" data-char="ح">ح</button>
            <button class="kb-btn" data-char="خ">خ</button>
            <button class="kb-btn" data-char="د">د</button>
            <button class="kb-btn" data-char="ذ">ذ</button>
            <button class="kb-btn" data-char="ر">ر</button>
            <button class="kb-btn" data-char="ز">ز</button>
            <button class="kb-btn" data-char="س">س</button>
            <button class="kb-btn" data-char="ش">ش</button>
            <button class="kb-btn" data-char="ص">ص</button>
            <button class="kb-btn" data-char="ض">ض</button>
            <button class="kb-btn" data-char="ط">ط</button>
            <button class="kb-btn" data-char="ظ">ظ</button>
            <button class="kb-btn" data-char="ع">ع</button>
            <button class="kb-btn" data-char="غ">غ</button>
            <button class="kb-btn" data-char="ف">ف</button>
            <button class="kb-btn" data-char="ق">ق</button>
            <button class="kb-btn" data-char="ك">ك</button>
            <button class="kb-btn" data-char="ل">ل</button>
            <button class="kb-btn" data-char="م">م</button>
            <button class="kb-btn" data-char="ن">ن</button>
            <button class="kb-btn" data-char="ه">ه</button>
            <button class="kb-btn" data-char="و">و</button>
            <button class="kb-btn" data-char="ي">ي</button>
            <button class="kb-btn" data-char="backspace" style="background:#f39c12; color:white;">⌫</button>
            <button class="kb-btn" data-char="space" style="background:#3498db; color:white; min-width:90px;">مسافة</button>
            <button class="kb-btn" data-char="clear" style="background:#e74c3c; color:white;">مسح الكل</button>
            <button class="kb-btn" id="kb-close" style="background:#95a5a6; color:white;">إغلاق</button>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
